apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetgkes.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetGke
    plural: targetgkes
    singular: targetgke
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  description:
                    description: Target description
                    type: string
                  gke_account_key:
                    description: GCP service account key JSON (base64) [sensitive]
                    type: string
                  gke_cluster_cert:
                    description: GKE cluster CA certificate (PEM) [sensitive]
                    type: string
                  gke_cluster_endpoint:
                    description: GKE cluster API server URL
                    type: string
                  gke_cluster_name:
                    description: GKE cluster name
                    type: string
                  gke_service_account_email:
                    description: GCP service account email
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                  use_gw_cloud_identity:
                    description: Use gateway cloud identity for authentication
                    type: boolean
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  description:
                    description: Target description
                    type: string
                  gke_account_key:
                    description: GCP service account key JSON (base64)
                    type: string
                  gke_cluster_cert:
                    description: GKE cluster CA certificate (PEM)
                    type: string
                  gke_cluster_endpoint:
                    description: GKE cluster API server URL
                    type: string
                  gke_cluster_name:
                    description: GKE cluster name
                    type: string
                  gke_service_account_email:
                    description: GCP service account email
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                  use_gw_cloud_identity:
                    description: Use gateway cloud identity for authentication
                    type: boolean
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
