apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayk8sauthconfigs.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: GatewayK8sAuthConfig
    plural: gatewayk8sauthconfigs
    singular: gatewayk8sauthconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  access_id:
                    description: The access ID of the Kubernetes auth method
                    type: string
                  cluster_api_type:
                    description: 'Cluster access type. options: [native_k8s, rancher]'
                    type: string
                  disable_issuer_validation:
                    description: Disable issuer validation [true/false]
                    type: string
                  k8s_auth_type:
                    description: K8S auth type [token/certificate]. (relevant for "native_k8s" only)
                    type: string
                  k8s_ca_cert:
                    description: The CA Certificate (base64 encoded) to use to call into the kubernetes API server
                    type: string
                  k8s_client_certificate:
                    description: Content of the k8 client certificate (PEM format) in a Base64 format (relevant for "native_k8s" only)
                    type: string
                  k8s_client_key:
                    description: Content of the k8 client private key (PEM format) in a Base64 format (relevant for "native_k8s" only)
                    type: string
                  k8s_host:
                    description: The URL of the kubernetes API server
                    type: string
                  k8s_issuer:
                    description: The Kubernetes JWT issuer name. K8SIssuer is the claim that specifies who issued the Kubernetes token
                    type: string
                  name:
                    description: K8S Auth config name (immutable)
                    type: string
                  rancher_api_key:
                    description: The api key used to access the TokenReview API to validate other JWTs (relevant for "rancher" only)
                    type: string
                  rancher_cluster_id:
                    description: The cluster id as define in rancher (relevant for "rancher" only)
                    type: string
                  signing_key:
                    description: The private key (base64 encoded) associated with the public key defined in the Kubernetes auth
                    type: string
                  token_exp:
                    description: Time in seconds of expiration of the Akeyless Kube Auth Method token
                    format: int64
                    type: integer
                  token_reviewer_jwt:
                    description: |-
                      A Kubernetes service account JWT used to access the TokenReview API to validate other JWTs (relevant for "native_k8s" only).
                      If not set, the JWT submitted in the authentication process will be used to access the Kubernetes TokenReview API.
                    type: string
                  use_gw_service_account:
                    description: Use the GW's service account
                    type: boolean
                required:
                - access_id
                - k8s_host
                - name
                - signing_key
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  access_id:
                    description: The access ID of the Kubernetes auth method
                    type: string
                  cluster_api_type:
                    description: 'Cluster access type. options: [native_k8s, rancher]'
                    type: string
                  disable_issuer_validation:
                    description: Disable issuer validation [true/false]
                    type: string
                  k8s_auth_type:
                    description: K8S auth type [token/certificate]. (relevant for "native_k8s" only)
                    type: string
                  k8s_ca_cert:
                    description: The CA Certificate (base64 encoded) to use to call into the kubernetes API server
                    type: string
                  k8s_client_certificate:
                    description: Content of the k8 client certificate (PEM format) in a Base64 format (relevant for "native_k8s" only)
                    type: string
                  k8s_client_key:
                    description: Content of the k8 client private key (PEM format) in a Base64 format (relevant for "native_k8s" only)
                    type: string
                  k8s_host:
                    description: The URL of the kubernetes API server
                    type: string
                  k8s_issuer:
                    description: The Kubernetes JWT issuer name. K8SIssuer is the claim that specifies who issued the Kubernetes token
                    type: string
                  name:
                    description: K8S Auth config name
                    type: string
                  rancher_api_key:
                    description: The api key used to access the TokenReview API to validate other JWTs (relevant for "rancher" only)
                    type: string
                  rancher_cluster_id:
                    description: The cluster id as define in rancher (relevant for "rancher" only)
                    type: string
                  signing_key:
                    description: The private key (base64 encoded) associated with the public key defined in the Kubernetes auth
                    type: string
                  token_exp:
                    description: Time in seconds of expiration of the Akeyless Kube Auth Method token
                    format: int64
                    type: integer
                  token_reviewer_jwt:
                    description: |-
                      A Kubernetes service account JWT used to access the TokenReview API to validate other JWTs (relevant for "native_k8s" only).
                      If not set, the JWT submitted in the authentication process will be used to access the Kubernetes TokenReview API.
                    type: string
                  use_gw_service_account:
                    description: Use the GW's service account
                    type: boolean
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
