apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetgodaddys.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetGodaddy
    plural: targetgodaddys
    singular: targetgodaddy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  api_key:
                    description: GoDaddy API key [sensitive]
                    type: string
                  customer_id:
                    description: Customer ID (ShopperId) required for renewal of imported certificates
                    type: string
                  description:
                    description: Target description
                    type: string
                  imap_fqdn:
                    description: IMAP server FQDN for domain validation
                    type: string
                  imap_password:
                    description: IMAP password [sensitive]
                    type: string
                  imap_port:
                    description: IMAP server port
                    type: string
                  imap_username:
                    description: IMAP username
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                  secret:
                    description: GoDaddy API secret [sensitive]
                    type: string
                  timeout:
                    description: GoDaddy API timeout
                    type: string
                required:
                - api_key
                - imap_fqdn
                - imap_password
                - imap_username
                - name
                - secret
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  api_key:
                    description: GoDaddy API key
                    type: string
                  customer_id:
                    description: Customer ID (ShopperId) required for renewal of imported certificates
                    type: string
                  description:
                    description: Target description
                    type: string
                  imap_fqdn:
                    description: IMAP server FQDN for domain validation
                    type: string
                  imap_password:
                    description: IMAP password
                    type: string
                  imap_port:
                    description: IMAP server port
                    type: string
                  imap_username:
                    description: IMAP username
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                  secret:
                    description: GoDaddy API secret
                    type: string
                  timeout:
                    description: GoDaddy API timeout
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
