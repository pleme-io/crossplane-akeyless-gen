apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetletsencrypts.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetLetsEncrypt
    plural: targetletsencrypts
    singular: targetletsencrypt
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  acme_challenge:
                    type: string
                  description:
                    description: Target description
                    type: string
                  dns_target_creds:
                    description: 'Name of existing cloud target for DNS credentials. Required when acme-challenge=dns. Supported: AWS, Azure, GCP targets'
                    type: string
                  email:
                    description: Email address for ACME account registration
                    type: string
                  gcp_project:
                    description: 'GCP Cloud DNS: Project ID. Optional - can be derived from service account'
                    type: string
                  hosted_zone:
                    description: AWS Route53 hosted zone ID. Required when dns-target-creds points to AWS target
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  lets_encrypt_url:
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                  resource_group:
                    description: Azure resource group name. Required when dns-target-creds points to Azure target
                    type: string
                  timeout:
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  acme_challenge:
                    type: string
                  description:
                    description: Target description
                    type: string
                  dns_target_creds:
                    description: 'Name of existing cloud target for DNS credentials. Required when acme-challenge=dns. Supported: AWS, Azure, GCP targets'
                    type: string
                  email:
                    description: Email address for ACME account registration
                    type: string
                  gcp_project:
                    description: 'GCP Cloud DNS: Project ID. Optional - can be derived from service account'
                    type: string
                  hosted_zone:
                    description: AWS Route53 hosted zone ID. Required when dns-target-creds points to AWS target
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  lets_encrypt_url:
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                  resource_group:
                    description: Azure resource group name. Required when dns-target-creds points to Azure target
                    type: string
                  timeout:
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
