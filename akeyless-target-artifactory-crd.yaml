apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetartifactorys.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetArtifactory
    plural: targetartifactorys
    singular: targetartifactory
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  artifactory_admin_name:
                    description: Artifactory admin username
                    type: string
                  artifactory_admin_pwd:
                    description: Artifactory admin password [sensitive]
                    type: string
                  base_url:
                    description: Artifactory base URL
                    type: string
                  description:
                    description: Target description
                    type: string
                  key:
                    description: |-
                      The name of a key used to encrypt the target secret value (if empty, the
                      account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                required:
                - artifactory_admin_name
                - artifactory_admin_pwd
                - base_url
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  artifactory_admin_name:
                    description: Artifactory admin username
                    type: string
                  artifactory_admin_pwd:
                    description: Artifactory admin password
                    type: string
                  base_url:
                    description: Artifactory base URL
                    type: string
                  description:
                    description: Target description
                    type: string
                  key:
                    description: |-
                      The name of a key used to encrypt the target secret value (if empty, the
                      account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
