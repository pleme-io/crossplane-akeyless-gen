apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshcertissuers.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: SshCertIssuer
    plural: sshcertissuers
    singular: sshcertissuer
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  ProviderType:
                    type: string
                  allowed_users:
                    description: Users allowed to fetch the certificate, e.g. root,ubuntu
                    type: string
                  delete_protection:
                    description: Enable delete protection
                    type: boolean
                  description:
                    description: Description of the object
                    type: string
                  extensions:
                    additionalProperties:
                      type: string
                    description: Signed certificates with extensions, e.g. permit-port-forwarding
                    type: object
                  external_username:
                    description: Externally provided username [true/false]
                    type: string
                  fixed_user_claim_keyname:
                    description: Key-name of IdP claim to extract username from (for external-username=true)
                    type: string
                  host_provider:
                    description: Host provider type [explicit/target]
                    type: string
                  name:
                    description: SSH certificate issuer name (immutable)
                    type: string
                  principals:
                    description: Signed certificates with principal, e.g. example_role1,example_role2
                    type: string
                  secure_access_use_internal_ssh_access:
                    description: Use internal SSH Access
                    type: boolean
                  signer_key_name:
                    description: Key to sign the certificate with (immutable)
                    type: string
                  tag:
                    description: Tags for the SSH cert issuer
                    items:
                      type: string
                    type: array
                  target:
                    description: A list of linked targets to be associated, Relevant only for Secure Remote Access for ssh cert issuer, ldap rotated secret and ldap dynamic secret, To specify multiple targets use argument multiple times
                    items:
                      type: string
                    type: array
                  ttl:
                    description: Certificate TTL in seconds
                    format: int64
                    type: integer
                required:
                - allowed_users
                - name
                - signer_key_name
                - ttl
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  ProviderType:
                    type: string
                  allowed_users:
                    description: Users allowed to fetch the certificate, e.g. root,ubuntu
                    type: string
                  delete_protection:
                    description: Enable delete protection
                    type: boolean
                  description:
                    description: Description of the object
                    type: string
                  extensions:
                    additionalProperties:
                      type: string
                    description: Signed certificates with extensions, e.g. permit-port-forwarding
                    type: object
                  external_username:
                    description: Externally provided username [true/false]
                    type: string
                  fixed_user_claim_keyname:
                    description: Key-name of IdP claim to extract username from (for external-username=true)
                    type: string
                  host_provider:
                    description: Host provider type [explicit/target]
                    type: string
                  name:
                    description: SSH certificate issuer name
                    type: string
                  principals:
                    description: Signed certificates with principal, e.g. example_role1,example_role2
                    type: string
                  secure_access_use_internal_ssh_access:
                    description: Use internal SSH Access
                    type: boolean
                  signer_key_name:
                    description: Key to sign the certificate with
                    type: string
                  tag:
                    description: Tags for the SSH cert issuer
                    items:
                      type: string
                    type: array
                  target:
                    description: A list of linked targets to be associated, Relevant only for Secure Remote Access for ssh cert issuer, ldap rotated secret and ldap dynamic secret, To specify multiple targets use argument multiple times
                    items:
                      type: string
                    type: array
                  ttl:
                    description: Certificate TTL in seconds
                    format: int64
                    type: integer
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
