apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetawss.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetAws
    plural: targetawss
    singular: targetaws
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  access_key:
                    description: AWS secret access key [sensitive]
                    type: string
                  access_key_id:
                    description: AWS access key ID [sensitive]
                    type: string
                  description:
                    description: Target description
                    type: string
                  generate_external_id:
                    description: A unique auto-generated value used in your AWS account when configuring your AWS IAM role to securely delegate access to Akeyless. Relevant only when using GW cloud ID
                    type: boolean
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                  region:
                    description: AWS region
                    type: string
                  role_arn:
                    description: AWS IAM role identifier that Gateway will assume in your AWS account, relevant only when using external ID
                    type: string
                  session_token:
                    description: AWS session token (for temporary credentials) [sensitive]
                    type: string
                  use_gw_cloud_identity:
                    description: Use gateway cloud identity for authentication
                    type: boolean
                required:
                - access_key
                - access_key_id
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  access_key:
                    description: AWS secret access key
                    type: string
                  access_key_id:
                    description: AWS access key ID
                    type: string
                  description:
                    description: Target description
                    type: string
                  generate_external_id:
                    description: A unique auto-generated value used in your AWS account when configuring your AWS IAM role to securely delegate access to Akeyless. Relevant only when using GW cloud ID
                    type: boolean
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                  region:
                    description: AWS region
                    type: string
                  role_arn:
                    description: AWS IAM role identifier that Gateway will assume in your AWS account, relevant only when using external ID
                    type: string
                  session_token:
                    description: AWS session token (for temporary credentials)
                    type: string
                  use_gw_cloud_identity:
                    description: Use gateway cloud identity for authentication
                    type: boolean
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
