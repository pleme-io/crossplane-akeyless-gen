apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rotatedsecretazures.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: RotatedSecretAzure
    plural: rotatedsecretazures
    singular: rotatedsecretazure
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  api_id:
                    description: API ID to rotate (relevant only for rotator-type=api-key)
                    type: string
                  api_key:
                    description: API key to rotate (relevant only for rotator-type=api-key) [sensitive]
                    type: string
                  application_id:
                    description: Id of the azure app that hold the serect to be rotated (relevant only for rotator-type=api-key & authentication-credentials=use-target-creds)
                    type: string
                  authentication_credentials:
                    description: 'Credentials to connect with: use-user-creds or use-target-creds'
                    type: string
                  auto_rotate:
                    description: Whether to automatically rotate every rotation-interval days [true/false]
                    type: string
                  delete_protection:
                    description: Enable delete protection
                    type: boolean
                  description:
                    description: Description of the object
                    type: string
                  explicitly_set_sa:
                    description: If set, explicitly provide the storage account details [true/false]
                    type: string
                  grace_rotation:
                    description: Enable graceful rotation (keep both versions temporarily). When enabled, a new secret version is created while the previous version is kept for the grace period, so both versions exist for a limited time. [true/false]
                    type: string
                  grace_rotation_hour:
                    description: The Hour of the grace rotation in UTC
                    format: int64
                    type: integer
                  grace_rotation_interval:
                    description: The number of days to wait before deleting the old key (must be bigger than rotation-interval)
                    type: string
                  grace_rotation_timing:
                    description: When to create the new version relative to the rotation date [after/before]
                    type: string
                  key:
                    description: Encryption key name for the secret value
                    type: string
                  max_versions:
                    description: Maximum number of versions
                    type: string
                  name:
                    description: Rotated secret name (immutable)
                    type: string
                  password_length:
                    description: Length of the password to be generated
                    type: string
                  resource_group_name:
                    description: The resource group name (only relevant when explicitly-set-sa=true)
                    type: string
                  resource_name:
                    description: The name of the storage account (only relevant when explicitly-set-sa=true)
                    type: string
                  rotate_after_disconnect:
                    description: Rotate after SRA session ends [true/false]
                    type: string
                  rotation_event_in:
                    description: How many days before the rotation of the item would you like to be notified
                    items:
                      type: string
                    type: array
                  rotation_hour:
                    description: The hour of the rotation in UTC
                    format: int64
                    type: integer
                  rotation_interval:
                    description: Days between every automatic key rotation (1-365)
                    type: string
                  rotator_type:
                    description: 'The rotator type: target or api-key'
                    type: string
                  storage_account_key_name:
                    description: The name of the storage account key to rotate [key1/key2/kerb1/kerb2] (relevat to azure-storage-account)
                    type: string
                  tags:
                    description: Tags for the rotated secret
                    items:
                      type: string
                    type: array
                  target_name:
                    description: Target name to associate
                    type: string
                required:
                - name
                - rotator_type
                - target_name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  api_id:
                    description: API ID to rotate (relevant only for rotator-type=api-key)
                    type: string
                  api_key:
                    description: API key to rotate (relevant only for rotator-type=api-key)
                    type: string
                  application_id:
                    description: Id of the azure app that hold the serect to be rotated (relevant only for rotator-type=api-key & authentication-credentials=use-target-creds)
                    type: string
                  authentication_credentials:
                    description: 'Credentials to connect with: use-user-creds or use-target-creds'
                    type: string
                  auto_rotate:
                    description: Whether to automatically rotate every rotation-interval days [true/false]
                    type: string
                  delete_protection:
                    description: Enable delete protection
                    type: boolean
                  description:
                    description: Description of the object
                    type: string
                  explicitly_set_sa:
                    description: If set, explicitly provide the storage account details [true/false]
                    type: string
                  grace_rotation:
                    description: Enable graceful rotation (keep both versions temporarily). When enabled, a new secret version is created while the previous version is kept for the grace period, so both versions exist for a limited time. [true/false]
                    type: string
                  grace_rotation_hour:
                    description: The Hour of the grace rotation in UTC
                    format: int64
                    type: integer
                  grace_rotation_interval:
                    description: The number of days to wait before deleting the old key (must be bigger than rotation-interval)
                    type: string
                  grace_rotation_timing:
                    description: When to create the new version relative to the rotation date [after/before]
                    type: string
                  key:
                    description: Encryption key name for the secret value
                    type: string
                  max_versions:
                    description: Maximum number of versions
                    type: string
                  name:
                    description: Rotated secret name
                    type: string
                  password_length:
                    description: Length of the password to be generated
                    type: string
                  resource_group_name:
                    description: The resource group name (only relevant when explicitly-set-sa=true)
                    type: string
                  resource_name:
                    description: The name of the storage account (only relevant when explicitly-set-sa=true)
                    type: string
                  rotate_after_disconnect:
                    description: Rotate after SRA session ends [true/false]
                    type: string
                  rotation_event_in:
                    description: How many days before the rotation of the item would you like to be notified
                    items:
                      type: string
                    type: array
                  rotation_hour:
                    description: The hour of the rotation in UTC
                    format: int64
                    type: integer
                  rotation_interval:
                    description: Days between every automatic key rotation (1-365)
                    type: string
                  rotator_type:
                    description: 'The rotator type: target or api-key'
                    type: string
                  storage_account_key_name:
                    description: The name of the storage account key to rotate [key1/key2/kerb1/kerb2] (relevat to azure-storage-account)
                    type: string
                  tags:
                    description: Tags for the rotated secret
                    items:
                      type: string
                    type: array
                  target_name:
                    description: Target name to associate
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
