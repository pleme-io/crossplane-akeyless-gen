            type: object
          status:
            properties:
              atProvider:
                properties:
                  description:
                    description: Target description
                    type: string
                  hosts:
                    description: Hosts for the linked target
                    type: string
                  name:
                    description: Target name
                    type: string
                  parent_target_name:
                    description: Parent target name to link to
                    type: string
                  type:
                    description: Specifies the hosts type, relevant only when working without parent target
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
