apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: targetsalesforces.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: TargetSalesforce
    plural: targetsalesforces
    singular: targetsalesforce
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  app_private_key_data:
                    description: Base64 encoded PEM of the connected app private key (relevant for JWT auth only)
                    type: string
                  auth_flow:
                    description: 'Salesforce auth flow: user-password or jwt-bearer'
                    type: string
                  ca_cert_data:
                    description: Base64 encoded PEM cert to use when uploading a new key to Salesforce
                    type: string
                  ca_cert_name:
                    description: name of the certificate in Salesforce tenant to use when uploading new key
                    type: string
                  client_id:
                    description: Salesforce connected app client ID
                    type: string
                  client_secret:
                    description: Salesforce connected app client secret [sensitive]
                    type: string
                  description:
                    description: Target description
                    type: string
                  email:
                    description: The email of the user attached to the oauth2 app used for connecting to Salesforce
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name (immutable)
                    type: string
                  security_token:
                    description: Salesforce security token [sensitive]
                    type: string
                  tenant_url:
                    description: Salesforce tenant URL
                    type: string
                required:
                - auth_flow
                - client_id
                - email
                - name
                - tenant_url
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  app_private_key_data:
                    description: Base64 encoded PEM of the connected app private key (relevant for JWT auth only)
                    type: string
                  auth_flow:
                    description: 'Salesforce auth flow: user-password or jwt-bearer'
                    type: string
                  ca_cert_data:
                    description: Base64 encoded PEM cert to use when uploading a new key to Salesforce
                    type: string
                  ca_cert_name:
                    description: name of the certificate in Salesforce tenant to use when uploading new key
                    type: string
                  client_id:
                    description: Salesforce connected app client ID
                    type: string
                  client_secret:
                    description: Salesforce connected app client secret
                    type: string
                  description:
                    description: Target description
                    type: string
                  email:
                    description: The email of the user attached to the oauth2 app used for connecting to Salesforce
                    type: string
                  key:
                    description: The name of a key that used to encrypt the target secret value (if empty, the account default protectionKey key will be used)
                    type: string
                  max_versions:
                    description: Set the maximum number of versions, limited by the account settings defaults.
                    type: string
                  name:
                    description: Target name
                    type: string
                  security_token:
                    description: Salesforce security token
                    type: string
                  tenant_url:
                    description: Salesforce tenant URL
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
