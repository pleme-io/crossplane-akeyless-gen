apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: roles.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: Role
    plural: roles
    singular: role
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  analytics_access:
                    description: Allow this role to view analytics
                    type: string
                  audit_access:
                    description: Allow this role to view audit logs
                    type: string
                  comment:
                    description: Deprecated - use description
                    type: string
                  delete_protection:
                    description: Protection from accidental deletion of this object [true/false]
                    type: string
                  description:
                    description: Role description
                    type: string
                  event_center_access:
                    description: |-
                      Allow this role to view Event Center. Currently only 'none', 'scoped' and 'all'
                      values are supported
                    type: string
                  event_forwarders_access:
                    description: Allow this role to manage Event Forwarders. Currently only 'none' and 'all' values are supported.
                    type: string
                  event_forwarders_name:
                    description: Allow this role to manage the following Event Forwarders.
                    items:
                      type: string
                    type: array
                  gw_analytics_access:
                    description: Allow this role to view gateway analytics
                    type: string
                  name:
                    description: Role name (immutable)
                    type: string
                  reverse_rbac_access:
                    description: 'Allow this role to view Reverse RBAC. Supported values: ''scoped'', ''all''.'
                    type: string
                  sra_reports_access:
                    description: Allow this role to view SRA reports
                    type: string
                  usage_reports_access:
                    description: |-
                      Allow this role to view Usage Report. Currently only 'none' and
                      'all' values are supported.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  analytics_access:
                    description: Allow this role to view analytics
                    type: string
                  audit_access:
                    description: Allow this role to view audit logs
                    type: string
                  comment:
                    description: Deprecated - use description
                    type: string
                  delete_protection:
                    description: Protection from accidental deletion of this object [true/false]
                    type: string
                  description:
                    description: Role description
                    type: string
                  event_center_access:
                    description: |-
                      Allow this role to view Event Center. Currently only 'none', 'scoped' and 'all'
                      values are supported
                    type: string
                  event_forwarders_access:
                    description: Allow this role to manage Event Forwarders. Currently only 'none' and 'all' values are supported.
                    type: string
                  event_forwarders_name:
                    description: Allow this role to manage the following Event Forwarders.
                    items:
                      type: string
                    type: array
                  gw_analytics_access:
                    description: Allow this role to view gateway analytics
                    type: string
                  name:
                    description: Role name
                    type: string
                  reverse_rbac_access:
                    description: 'Allow this role to view Reverse RBAC. Supported values: ''scoped'', ''all''.'
                    type: string
                  sra_reports_access:
                    description: Allow this role to view SRA reports
                    type: string
                  usage_reports_access:
                    description: |-
                      Allow this role to view Usage Report. Currently only 'none' and
                      'all' values are supported.
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
