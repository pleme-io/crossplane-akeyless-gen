apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kmipclients.akeyless.crossplane.io
spec:
  group: akeyless.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akeyless
    kind: KmipClient
    plural: kmipclients
    singular: kmipclient
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              forProvider:
                properties:
                  activate_keys_on_creation:
                    description: If set to 'true', newly created keys on the client will be set to an 'active' state
                    type: string
                  certificate_ttl:
                    description: Client certificate TTL in days
                    format: int64
                    type: integer
                  name:
                    description: Client name (immutable)
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            properties:
              atProvider:
                properties:
                  activate_keys_on_creation:
                    description: If set to 'true', newly created keys on the client will be set to an 'active' state
                    type: string
                  certificate_ttl:
                    description: Client certificate TTL in days
                    format: int64
                    type: integer
                  name:
                    description: Client name
                    type: string
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
